name: Pull Requests
on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

jobs:
  test:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-go@v5
        with:
          go-version: 1.21.x
          cache: true
      - name: unit tests
        run: go test -v -race -timeout=120s ./...
  integration:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-go@v5
        with:
          go-version: 1.21.x
          cache: true
      - name: integration tests
        run: go test -v -tags=integration -timeout=10m ./...
  #  qodana:
  #    runs-on: ubuntu-latest
  #    permissions:
  #      contents: write
  #      pull-requests: write
  #      checks: write
  #    needs: test
  #    steps:
  #      - uses: actions/checkout@v4
  #        with:
  #          ref: ${{ github.event.pull_request.head.sha }}  # to check out the actual pull request commit, not the merge commit
  #          fetch-depth: 0  # a full history is required for pull request analysis
  #      - name: 'Qodana Scan'
  #        uses: JetBrains/qodana-action@v2024.3
  #        env:
  #          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
  automerge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    needs:
      - test
      - integration
    steps:
      - uses: fastify/github-action-merge-dependabot@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
