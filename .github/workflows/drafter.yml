name: Release Drafter
on:
  push:
    branches:
      - main

jobs:
  test:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: unit tests
        run: go test -v -race -timeout=120s ./...
  integration:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: integration tests
        run: go test -v -tags=integration -timeout=10m ./...
  #  qodana:
